    <path d="M1331 474L1584 372L1584 628" stroke="#D6B1BA" stroke-opacity="0.34" stroke-width="2"/>
    <path d="M1112 350L1331 474L1331 731" stroke="#F5EEF1" stroke-opacity="0.18" stroke-width="1.5"/>
