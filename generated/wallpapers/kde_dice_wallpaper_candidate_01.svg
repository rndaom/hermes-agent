<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050608"/>
      <stop offset="0.55" stop-color="#0B0D10"/>
      <stop offset="1" stop-color="#121116"/>
    </linearGradient>
    <radialGradient id="roseWash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1495 280) rotate(128.7) scale(560 360)">
      <stop offset="0" stop-color="#B78B95" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#7F5D67" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7F5D67" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="baseGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1352 720) rotate(90) scale(240 420)">
      <stop offset="0" stop-color="#B78B95" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#B78B95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frontFace" x1="1120" y1="350" x2="1455" y2="695" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1D21"/>
      <stop offset="0.45" stop-color="#0E1115"/>
      <stop offset="1" stop-color="#06080B"/>
    </linearGradient>
    <linearGradient id="topFace" x1="1110" y1="350" x2="1330" y2="245" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#272B30"/>
      <stop offset="0.62" stop-color="#13161A"/>
      <stop offset="1" stop-color="#0A0D10"/>
    </linearGradient>
    <linearGradient id="sideFace" x1="1465" y1="355" x2="1628" y2="595" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13161A"/>
      <stop offset="0.55" stop-color="#090B0E"/>
      <stop offset="1" stop-color="#040507"/>
    </linearGradient>
    <linearGradient id="edgeRose" x1="1220" y1="320" x2="1610" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E4B8C2" stop-opacity="0.85"/>
      <stop offset="0.48" stop-color="#A06D78" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#A06D78" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="900" y="250" width="860" height="700" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
