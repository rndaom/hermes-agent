    <circle cx="1258" cy="444" r="17"/>
    <circle cx="1186" cy="542" r="17"/>
  </g>

  <g fill="#F1F3F5">
    <circle cx="1434" cy="476" r="15"/>
    <circle cx="1514" cy="536" r="15"/>
    <circle cx="1434" cy="598" r="15"/>
  </g>

  <g opacity="0.2">
